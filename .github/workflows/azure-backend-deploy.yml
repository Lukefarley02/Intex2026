name: Deploy Backend to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy .NET Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore ./backend/Intex2026.Api.csproj

      - name: Build
        run: dotnet build ./backend/Intex2026.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./backend/Intex2026.Api.csproj --configuration Release --no-build --output ./backend-publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Ember-api'
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: './backend-publish'
